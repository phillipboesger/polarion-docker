name: PR Checks

on:
  pull_request:
    branches: [main, master, v*]

jobs:
  static-checks:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3009,DL3015

      - name: Lint Shell Scripts (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: error
          additional_files: "polarion_starter.sh"
        env:
          SHELLCHECK_OPTS: --shell=bash --exclude=SC1091,SC2039

      - name: Lint YAML files (yamllint)
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/workflows/ \
            docker-compose.yml \
            docker-compose.dev.yml

      - name: Check Python syntax
        run: |
          python3 -m py_compile scripts/download_polarion_zip.py
          echo "✅ Python syntax OK"

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml valid"
          docker compose -f docker-compose.dev.yml config --quiet
          echo "✅ docker-compose.dev.yml valid"
