name: PR Checks

on:
  pull_request:
    branches: [main, master, v*]

jobs:
  static-checks:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3009,DL3015

      - name: Lint Shell Scripts (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: error
          additional_files: "polarion_starter.sh"
        env:
          SHELLCHECK_OPTS: --shell=bash --exclude=SC1091,SC2039

      - name: Lint YAML files (yamllint)
        run: |
          pip install --quiet yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/workflows/ \
            docker-compose.yml \
            docker-compose.dev.yml

      - name: Check Python syntax
        run: |
          python3 -m py_compile scripts/download_polarion_zip.py
          echo "✅ Python syntax OK"

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml valid"
          docker compose -f docker-compose.dev.yml config --quiet
          echo "✅ docker-compose.dev.yml valid"

  mail-debugging:
    name: Mail Debugging (Mailpit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Mailpit sidecar
        run: docker compose -f docker-compose.yml up -d mailpit

      - name: Wait for Mailpit web API
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8025/api/v1/messages >/dev/null 2>&1; then
              echo "✅ Mailpit API is up"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Mailpit API did not become ready"
          docker compose -f docker-compose.yml logs mailpit
          exit 1

      - name: Send a test mail to SMTP port 25
        run: |
          python3 - <<'PY'
          import smtplib
          from email.message import EmailMessage

          msg = EmailMessage()
          msg["From"] = "polarion@example.test"
          msg["To"] = "dev@example.test"
          msg["Subject"] = "CI mail-debugging probe"
          msg.set_content("If Mailpit captured this, SMTP mail debugging works.")
          with smtplib.SMTP("localhost", 25, timeout=15) as smtp:
              smtp.send_message(msg)
          print("✅ Test mail sent to localhost:25")
          PY

      - name: Assert Mailpit captured the mail
        run: |
          total=$(curl -fsS http://localhost:8025/api/v1/messages \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('total', 0))")
          echo "Captured messages: $total"
          if [ "$total" -lt 1 ]; then
            echo "❌ Mailpit did not capture the test mail"
            docker compose -f docker-compose.yml logs mailpit
            exit 1
          fi
          echo "✅ Mail debugging verified end-to-end (SMTP 25 -> Mailpit -> API)"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down --remove-orphans
