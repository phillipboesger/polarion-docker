version: '3.8'

services:
  polarion:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64  # Force x86_64 architecture for Rosetta compatibility
    platform: linux/amd64  # Important for Apple Silicon Macs
    container_name: polarion
    mem_limit: 4g
    ports:
      - "80:80"         # Standard HTTP port
      - "5433:5433"     # PostgreSQL port (if PostgreSQL runs in container)
      - "5005:5005"     # JDWP Debug port
      - "8025:8025"     # built-in Mailpit web UI -> http://localhost:8025
    environment:
      - POLARION_HOME=/polarion_root
      - JAVA_OPTS=-Xmx3g -Xms3g
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - JDWP_ENABLED=true
      # The built-in Mailpit catcher runs by default and captures Polarion's outgoing
      # notification mail (open http://localhost:8025). To route mail to a real server
      # instead, set SMTP_HOST/SMTP_PORT here; to disable the catcher, set MAILPIT_EMBEDDED=false.
    healthcheck:
      test:
        - CMD
        - wget
        - -o
        - /dev/null
        - -O
        - /dev/null
        - http://localhost/polarion/
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped
