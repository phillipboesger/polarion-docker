version: '3.8'

services:
  polarion:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64  # Force x86_64 architecture for Rosetta compatibility
    platform: linux/amd64  # Important for Apple Silicon Macs
    container_name: polarion
    mem_limit: 4g
    ports:
      - "80:80"         # Standard HTTP port
      - "5433:5433"     # PostgreSQL port (if PostgreSQL runs in container)
      - "5005:5005"     # JDWP Debug port
    environment:
      - POLARION_HOME=/polarion_root
      - JAVA_OPTS=-Xmx3g -Xms3g
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - JDWP_ENABLED=true
      # Route mail notifications to the Mailpit sidecar (internal SMTP on 1025)
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    depends_on:
      - mailpit
    healthcheck:
      test:
        - CMD
        - wget
        - -o
        - /dev/null
        - -O
        - /dev/null
        - http://localhost/polarion/
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - polarion_network

  mailpit:
    # Catches all outgoing Polarion notification mails for local debugging.
    # SMTP listens on 1025 (reached internally as mailpit:1025); web UI on 8025.
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "25:1025"       # SMTP (host 25 -> Mailpit 1025)
      - "8025:8025"     # Mailpit web UI -> http://localhost:8025
    restart: unless-stopped
    networks:
      - polarion_network

networks:
  polarion_network:
    driver: bridge
