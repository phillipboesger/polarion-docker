version: '3.8'

services:
  polarion:
    # Local development defaults to the locally built image.
    # Override with POLARION_IMAGE=ghcr.io/phillipboesger/polarion-docker:latest when needed.
    image: ${POLARION_IMAGE:-polarion:local}
    platform: linux/amd64  # Important for Apple Silicon Macs
    container_name: polarion
    mem_limit: 4g
    ports:
      - "80:80"         # HTTP port
      - "5433:5433"     # PostgreSQL port
      - "5005:5005"     # JDWP Debug port
    environment:
      # These can be customized when creating the container
      - POLARION_HOME=/polarion_root
      - JAVA_OPTS=-Xmx3g -Xms3g
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - JDWP_ENABLED=true
      # Route mail notifications to the Mailpit sidecar (SMTP on port 25)
      - SMTP_HOST=mailpit
      - SMTP_PORT=25
    depends_on:
      - mailpit
    healthcheck:
      test:
        - CMD
        - wget
        - -o
        - /dev/null
        - -O
        - /dev/null
        - http://localhost/polarion/
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mailpit:
    # Catches all outgoing Polarion notification mails for local debugging.
    # SMTP listens on port 25 (reached internally as mailpit:25); web UI on 8025.
    image: axllent/mailpit:latest
    container_name: mailpit
    environment:
      - MP_SMTP_BIND_ADDR=0.0.0.0:25   # listen for SMTP on the standard port
    ports:
      - "25:25"         # SMTP
      - "8025:8025"     # Mailpit web UI -> http://localhost:8025
    restart: unless-stopped
