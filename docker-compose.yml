version: '3.8'

services:
  polarion:
    # Local development defaults to the locally built image.
    # Override with POLARION_IMAGE=ghcr.io/phillipboesger/polarion-docker:latest when needed.
    image: ${POLARION_IMAGE:-polarion:local}
    platform: linux/amd64  # Important for Apple Silicon Macs
    container_name: polarion
    mem_limit: 4g
    ports:
      - "80:80"         # HTTP port
      - "5433:5433"     # PostgreSQL port
      - "5005:5005"     # JDWP Debug port
    environment:
      # These can be customized when creating the container
      - POLARION_HOME=/polarion_root
      - JAVA_OPTS=-Xmx3g -Xms3g
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - JDWP_ENABLED=true
    healthcheck:
      test:
        - CMD
        - wget
        - -o
        - /dev/null
        - -O
        - /dev/null
        - http://localhost/polarion/
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped
